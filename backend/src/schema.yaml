  /customers/profile/{id}/change-role/:
    patch:
      operationId: customers_profile_change_role_partial_update
      description: Toggles user role between CUSTOMER and ADMIN.
      summary: Change User Role
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProfile'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfile'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfile'
      security:
      - XSessionTokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
              examples:
                RoleChangedToADMIN:
                  value:
                    email: user@example.com
                    first_name: John
                    last_name: Doe
                    full_name: John Doe
                    date_of_birth: '1990-01-01'
                    age: 36
                    phone_number: '+48123456789'
                    role: ADMIN
                  summary: Role changed to ADMIN
          description: Role changed successfully
        '403':
          description: Permission denied
        '404':
          description: Profile not found
