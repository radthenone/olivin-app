  /customers/addresses/{id}/set-default/:
    patch:
      operationId: customers_addresses_set_default_partial_update
      description: Sets the address as the default address for the authenticated user.
      summary: Set Default Address
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Addresses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAddress'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAddress'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAddress'
      security:
      - XSessionTokenAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
              examples:
                AddressSetAsDefault:
                  value:
                    id: 1
                    street: ul. Przykładowa 1
                    city: Warszawa
                    postal_code: 00-001
                    country: PL
                    is_default: true
                  summary: Address set as default
          description: Address set as default successfully
        '400':
          description: Address is already set as default
        '403':
          description: Permission denied
        '404':
          description: Address not found
