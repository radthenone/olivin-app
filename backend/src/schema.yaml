components:
  schemas:
    Address:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        street:
          type: string
          description: Street address
          maxLength: 255
        street2:
          type: string
          description: Street address line 2
          maxLength: 255
        city:
          type: string
          description: City name
          maxLength: 100
        state:
