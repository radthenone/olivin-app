info:
  title: olivin-app
  version: 1.0.0
  description: API documentation
paths:
  /csrf/:
    get:
      operationId: csrf_list
      tags:
      - Csrf
      security:
      - XSessionTokenAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    csrfToken:
                      type: string
          description: ''
  /customers/addresses/:
    get:
      operationId: customers_addresses_list
      description: |-
        A viewset for viewing and editing address instances.

