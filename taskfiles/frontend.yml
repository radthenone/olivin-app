# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
    run:
        desc: Run Expo app
        dir: frontend
        interactive: true
        cmds:
            - bun run lan
    rebuild:
        desc: Rebuild Expo app
        dir: frontend
        interactive: true
        cmds:
            - bun run free-cache
