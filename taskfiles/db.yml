# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
    migrate:
        desc: Run migrations (task db:migrate)
        cmds:
            - docker exec -it olivin-django python manage.py migrate

    migrations:make:
        desc: Make migrations for specific app (task db:migrations:make -- <app-name>)
        cmds:
            - docker exec -it olivin-django python manage.py makemigrations {{.CLI_ARGS}}

    migrations:merge:
        desc: Merge migrations for specific app (task db:migrations:merge -- <app-name>)
        cmds:
            - docker exec -it olivin-django python manage.py makemigrations --merge {{.CLI_ARGS}}

    migrations:squash:
        desc: Squash migrations for specific app (task db:migrations:squash -- <app-name> 0001 0005)
        cmds:
            - docker exec -it olivin-django python manage.py squashmigrations {{.CLI_ARGS}}

    migrations:show:
        desc: Show migrations for specific app (task db:migrations:show -- <app-name>)
        cmds:
            - docker exec -it olivin-django python manage.py showmigrations {{.CLI_ARGS}}

    migrations:rollback:
        desc: Rollback migration to specific version (task db:migrations:rollback -- <app-name> 0001)
        cmds:
            - docker exec -it olivin-django python manage.py migrate {{.CLI_ARGS}}

    migrations:empty:
        desc: Create empty migration for specific app (task db:migrations:empty -- <app-name>)
        cmds:
            - docker exec -it olivin-django python manage.py makemigrations --empty {{.CLI_ARGS}}

    migrations:reset:
        desc: Reset migrations for specific app (task db:migrations:reset -- <app-name>)
        cmds:
            - bash -c "find backend/src/apps/{{.CLI_ARGS}}/migrations -type f -name '*.py' ! -name '__init__.py' | xargs rm -f"
            - docker exec -it olivin-django python manage.py makemigrations {{.CLI_ARGS}}
            - docker exec -it olivin-django python manage.py migrate {{.CLI_ARGS}}

    migrations:clean:
        desc: Delete all migrations except __init__.py (task db:migrations:clean -- <app-name>)
        cmds:
            - bash -c "find backend/src/apps/{{.CLI_ARGS}}/migrations -type f -name '*.py' ! -name '__init__.py' | xargs rm -f"

    backup:
        desc: Create a database backup (task db:backup)
        vars:
            BACKUP_DIR: backups
            BACKUP_FILE: "{{.BACKUP_DIR}}/olivindb_{{now | date \"20060102_150405\"}}.dump"
        cmds:
            - mkdir -p {{.BACKUP_DIR}}
            - docker exec -t olivin-postgres pg_dump -U postgres -d olivin_db -Fc -f /tmp/olivindb.dump
            - docker cp olivin-postgres:/tmp/olivindb.dump {{.BACKUP_FILE}}
            - docker exec -t olivin-postgres rm -f /tmp/olivindb.dump
            - echo "✅ Backup saved to {{.BACKUP_FILE}}"

    restore:
        desc: Restore database from a backup file (task db:restore -- backups/file.dump)
        cmds:
            - |
                if [ -z "{{.CLI_ARGS}}" ]; then
                    echo "❌ Error: Please provide a backup file path, e.g., task db:restore -- backups/olivindb_xyz.dump";
                    exit 1;
                fi
            - docker cp {{.CLI_ARGS}} olivin-postgres:/tmp/restore.dump
            - docker exec -t olivin-postgres dropdb -U postgres olivin_db --if-exists
            - docker exec -t olivin-postgres createdb -U postgres olivin_db
            - docker exec -t olivin-postgres pg_restore -U postgres -d olivin_db -Fc /tmp/restore.dump
            - docker exec -t olivin-postgres rm -f /tmp/restore.dump
            - echo "✅ Database restored from {{.CLI_ARGS}}"

    clean:volumes:
        desc: Delete all volumes
        cmds:
            - docker compose --profile backend --profile local down; docker volume rm olivin-data olivin-media
