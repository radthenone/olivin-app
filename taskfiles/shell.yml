# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
    run:
        desc: Open Django shell
        cmds:
            - docker exec -it olivin-django python manage.py shell

    run:plus:
        desc: Open Django shell_plus with auto-imports
        interactive: true
        cmds:
            - bash -lc './scripts/django-shell-plus.sh'
