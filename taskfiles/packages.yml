# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
    frontend:add:
        desc: Add frontend package (task app:frontend:add -- <package>)
        dir: frontend
        cmds:
            - bun add {{.CLI_ARGS}}

    frontend:remove:
        desc: Remove frontend package (task app:frontend:remove -- <package>)
        dir: frontend
        cmds:
            - bun remove {{.CLI_ARGS}}

    backend:add:
        desc: Add backend package (task app:backend:add -- <package>)
        dir: backend
        cmds:
            - uv add {{.CLI_ARGS}}

    backend:remove:
        desc: Remove backend package (task app:backend:remove -- <package>)
        dir: backend
        cmds:
            - uv remove {{.CLI_ARGS}}
